name: seshly
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # ----------------------------
  # UI / ICONS
  # ----------------------------
  cupertino_icons: ^1.0.8

  # ----------------------------
  # FIREBASE CORE
  # ----------------------------
  firebase_core: ^3.4.0

  # ----------------------------
  # AUTHENTICATION
  # ----------------------------
  firebase_auth: ^5.2.0
  google_sign_in: ^6.2.1 # optional, future social login

  # ----------------------------
  # DATABASE
  # ----------------------------
  cloud_firestore: ^5.4.0
  cloud_functions: ^5.0.1

  # ----------------------------
  # ANALYTICS / GROWTH (FUTURE)
  # ----------------------------
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.0

  # ----------------------------
  # STORAGE (FUTURE: PROFILE PICS, NOTES)
  # ----------------------------
  firebase_storage: ^12.2.0

  # ----------------------------
  # NOTIFICATIONS (FUTURE)
  # ----------------------------
  firebase_messaging: ^15.1.0

  # ----------------------------
  # STATE MANAGEMENT (LIKELY)
  # ----------------------------
  provider: ^6.1.2

  # ----------------------------
  # UTILITIES
  # ----------------------------
  intl: ^0.19.0        # date / time formatting
  uuid: ^4.4.0        # ids for sessions, notes, etc
  flutter_speed_dial: ^7.0.0
  image_picker: ^1.0.0
  video_player: ^2.8.1
  url_launcher: ^6.2.1
  path_provider: ^2.1.1
  flutter_svg: ^2.0.9
  file_picker: ^8.0.0
  crypto: ^3.0.3
  speech_to_text: ^6.6.0
  syncfusion_flutter_pdf: ^27.2.14
  syncfusion_flutter_pdfviewer: ^27.2.14
  record: ^5.1.2
  audioplayers: ^5.2.1
  cross_file: ^0.3.4
  http: ^1.2.2
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.3
  flutter_webrtc: ^0.10.8
  livekit_client: ^2.0.4

dependency_overrides:
  dart_webrtc:
    path: third_party/dart_webrtc
  record_windows:
    path: third_party/record_windows
  record_linux:
    path: third_party/record_linux

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/seshly_logo_colored.svg
    - assets/images/seshly_logo_white.svg
    - assets/images/seshly_logo_full.svg
